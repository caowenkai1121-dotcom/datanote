<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · DataNote 数据平台</title>
<link rel="stylesheet" href="css/dn-design.css?v=u49">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-main, #f4f6fa);
    color: var(--text-primary, #1a2233);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-shell {
    display: flex; width: 880px; max-width: 94vw; min-height: 520px;
    background: var(--bg-card, #fff);
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 24px 70px rgba(20, 30, 60, .16);
    border: 1px solid var(--border, #e4e8f0);
  }
  /* 左品牌区 */
  .login-brand {
    flex: 1; position: relative; padding: 48px 44px;
    background: linear-gradient(150deg, #2f3a52 0%, #3b4a6b 45%, var(--primary, #4f6cf7) 130%);
    color: #fff; display: flex; flex-direction: column;
  }
  .login-brand .logo { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 700; letter-spacing: .3px; }
  .login-brand .logo svg { width: 30px; height: 30px; }
  .login-brand .tagline { margin-top: auto; }
  .login-brand .tagline h1 { font-size: 27px; font-weight: 700; line-height: 1.35; }
  .login-brand .tagline p { margin-top: 14px; font-size: 13.5px; line-height: 1.9; color: rgba(255,255,255,.78); max-width: 320px; }
  .login-brand .dots { position: absolute; right: -40px; bottom: -40px; width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(255,255,255,.12) 2px, transparent 2.5px); background-size: 22px 22px; opacity: .6; }
  /* 右表单区 */
  .login-form { width: 400px; max-width: 50vw; padding: 52px 46px; display: flex; flex-direction: column; justify-content: center; }
  .login-form h2 { font-size: 22px; font-weight: 700; }
  .login-form .sub { margin-top: 8px; font-size: 13px; color: var(--text-muted, #8a94a6); }
  .field { margin-top: 22px; }
  .field label { display: block; font-size: 12.5px; color: var(--text-regular, #5b6577); margin-bottom: 7px; font-weight: 500; }
  .field input {
    width: 100%; height: 44px; padding: 0 14px; font-size: 14px;
    border: 1px solid var(--border, #dde2ec); border-radius: 10px;
    background: var(--bg-main, #f7f9fc); color: var(--text-primary, #1a2233);
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .field input:focus { outline: none; border-color: var(--primary, #4f6cf7); background: #fff;
    box-shadow: 0 0 0 3px rgba(79, 108, 247, .14); }
  .login-btn {
    width: 100%; height: 46px; margin-top: 28px; border: 0; border-radius: 10px;
    background: var(--primary, #4f6cf7); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: filter .15s, transform .06s, box-shadow .15s; box-shadow: 0 8px 20px rgba(79, 108, 247, .28);
  }
  .login-btn:hover { filter: brightness(1.06); }
  .login-btn:active { transform: translateY(1px); }
  .login-btn:disabled { opacity: .6; cursor: not-allowed; box-shadow: none; }
  .login-err { margin-top: 16px; min-height: 18px; font-size: 13px; color: var(--error, #e0414e); }
  .login-hint { margin-top: 26px; font-size: 12px; color: var(--text-faint, #aab2c0); line-height: 1.7; }
  @media (max-width: 680px) { .login-brand { display: none; } .login-form { width: 100%; max-width: 100vw; } }
</style>
</head>
<body>
  <div class="login-shell">
    <div class="login-brand">
      <div class="logo">
        <svg viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="6" fill="#fff" fill-opacity=".16"/><path d="M8 9h12M8 14h8M8 19h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        DataNote
      </div>
      <div class="tagline">
        <h1>一站式数据<br>开发治理平台</h1>
        <p>数据资产驾驶舱 · 开发 / 治理 / 质量 / 同步 / 主数据全景。登录后按你的角色权限进入相应模块。</p>
      </div>
      <div class="dots"></div>
    </div>
    <div class="login-form">
      <h2>欢迎登录</h2>
      <div class="sub">请输入账号密码进入数据平台</div>
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" type="text" placeholder="请输入用户名" autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="login-btn" id="loginBtn" type="submit">登 录</button>
        <div class="login-err" id="loginErr"></div>
      </form>
      <div class="login-hint" id="loginHint"></div>
    </div>
  </div>

<script>
(function () {
  var form = document.getElementById('loginForm');
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginErr');
  var hintEl = document.getElementById('loginHint');

  // 已登录则直接进主页；认证未启用(开发模式)也直接进
  fetch('/api/auth/status').then(function (r) { return r.json(); }).then(function (res) {
    var d = (res && res.code === 0) ? (res.data || {}) : {};
    if (d.authEnabled === false) { hintEl.textContent = '当前为开放模式(未设置登录密码),可直接进入。'; }
    if (d.authenticated === true) { location.replace('workspace.html'); }
  }).catch(function () {});

  function fail(msg) { errEl.textContent = msg || '登录失败'; btn.disabled = false; btn.textContent = '登 录'; }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errEl.textContent = '';
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    if (!username) { fail('请输入用户名'); return; }
    if (!password) { fail('请输入密码'); return; }
    btn.disabled = true; btn.textContent = '登录中…';
    fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    }).then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
      .then(function (resp) {
        var b = resp.body || {};
        if (b.code === 0) { location.replace('workspace.html'); return; }
        fail(b.msg || (resp.status === 401 ? '用户名或密码错误' : '登录失败'));
      })
      .catch(function () { fail('网络错误,请稍后重试'); });
  });
})();
</script>
</body>
</html>
