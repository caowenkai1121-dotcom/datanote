# ============================================================
#  DataNote 配置文件
#  开源部署时请根据实际环境修改以下配置
# ============================================================

server:
  port: 8099
  servlet:
    session:
      timeout: 8h               # 会话空闲超时(防长期挂起会话被盗用)
      cookie:
        http-only: true         # JS 不可读会话 Cookie(防 XSS 窃取)
        same-site: lax          # 跨站请求不带会话 Cookie(CSRF 兜底)

# -------------------- MySQL 元数据库 --------------------
spring:
  main:
    allow-circular-references: true  # TaskSchedulerService <-> TaskExecutionService 循环依赖
  task:
    scheduling:
      pool:
        size: 4   # @Scheduled 默认单线程, 指标计算/健康分快照/调度tick互相阻塞; fixedDelay 同任务不重入语义不变
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE:20MB}      # AI 数据中心单文件上限
      max-request-size: ${UPLOAD_MAX_REQUEST:60MB} # 多文件合计上限
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/datanote?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

# -------------------- MyBatis-Plus --------------------
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}

# -------------------- Doris JDBC --------------------
doris:
  host: ${DORIS_HOST:38.76.183.50}
  query-port: ${DORIS_QUERY_PORT:9030}
  database: ${DORIS_DATABASE:ods}
  url: ${DORIS_URL:jdbc:mysql://38.76.183.50:9030/ods?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
  username: ${DORIS_USERNAME:root}
  password: ${DORIS_PASSWORD:123456}

# -------------------- DataX 数据同步 --------------------
datax:
  home: ${DATAX_HOME:/opt/datax}
  jvm: ${DATAX_JVM:-Xms1g -Xmx1g}
  job-dir: ${DATAX_JOB_DIR:/tmp/datax_jobs}
  mode: ${DATAX_MODE:local}

# -------------------- DolphinScheduler 调度 --------------------
dolphin:
  api-url: ${DS_API_URL:http://127.0.0.1:12345/dolphinscheduler}
  token: ${DS_TOKEN:}
  project-code: ${DS_PROJECT_CODE:0}
  tenant-code: ${DS_TENANT_CODE:default}

# -------------------- DataNote 配置 --------------------
datanote:
  crypto:
    key: ${DATANOTE_CRYPTO_KEY:}
  auth:
    username: ${DATANOTE_USERNAME:admin}
    password: ${DATANOTE_PASSWORD:}
  ai:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-6}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
    # 嵌入(向量化)服务: 独立于 chat provider(deepseek 无 embeddings 端点)。OpenAI 兼容 /embeddings
    embedding-provider: ${EMB_PROVIDER:bailian}
    embedding-base-url: ${EMB_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    embedding-api-key: ${EMB_API_KEY:}
    embedding-model: ${EMB_MODEL:text-embedding-v3}
    embedding-dim: ${EMB_DIM:1024}
  # 向量库(Qdrant, REST) — 语义检索 + RAG; 默认关闭, 不可用优雅降级关键字
  vector:
    enabled: ${VECTOR_ENABLED:false}
    base-url: ${QDRANT_URL:http://datanote-qdrant:6333}
    api-key: ${QDRANT_API_KEY:}
    collection: ${QDRANT_COLLECTION:dn_meta}
  # 图数据库(Neo4j, HTTP Query API) — 血缘多跳/实体关系; 默认关闭, 不可用回退 Java BFS
  graph:
    enabled: ${GRAPH_ENABLED:false}
    base-url: ${NEO4J_HTTP:http://datanote-neo4j:7474}
    user: ${NEO4J_USER:neo4j}
    password: ${NEO4J_PWD:}
  sync:
    executor:
      # FULL/INCREMENTAL 同步线程池大小（优先级池），高优先级任务先跑
      pool-size: ${SYNC_EXECUTOR_POOL:4}
    cdc:
      # Debezium database.server.id 基准值，最终 server.id = base + (jobId % 100000)
      # 须与源库现有 server-id/生产 slave 错开，避免撞号
      server-id-base: ${DATANOTE_CDC_SERVER_ID_BASE:5400}
      # Debezium 背压配置
      max-batch-size: ${SYNC_CDC_MAX_BATCH:2048}
      max-queue-size: ${SYNC_CDC_MAX_QUEUE:8192}
      poll-interval-ms: ${SYNC_CDC_POLL_MS:500}
      # Debezium 心跳间隔毫秒，低频源库借此推进 offset（>0 启用，0 关闭）
      heartbeat-interval-ms: ${SYNC_CDC_HEARTBEAT_MS:30000}
  alert:
    enabled: ${ALERT_ENABLED:false}
    webhook-urls: ${ALERT_WEBHOOKS:}
    dingtalk-webhook: ${ALERT_DINGTALK:}
    throttle-min: ${ALERT_THROTTLE_MIN:30}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

# -------------------- SpringDoc API 文档 --------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
