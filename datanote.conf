# ============================================================
# DataNote 部署配置
# 两个安装脚本共享此文件，修改后重新运行脚本即可生效
# ============================================================

# ---------- MySQL ----------
MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_PASSWORD=root

# ---------- Hive ----------
HIVE_PORT=10800

# ---------- HDFS ----------
HDFS_WEB_PORT=9870

# ---------- DataNote ----------
DATANOTE_PORT=8099

# ---------- DataX ----------
# local=本地执行  docker=Docker容器执行
DATAX_MODE=local

# ---------- 加密密钥（16/24/32 字节）----------
CRYPTO_KEY=DataNote_AES_Key

# ---------- Docker 网络 ----------
NETWORK=datanote-net
