# ============================================================
# DataNote 部署配置
# 两个安装脚本共享此文件，修改后重新运行脚本即可生效
# ============================================================

# ---------- MySQL ----------
MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_PASSWORD=root

# ---------- Doris ----------
DORIS_HOST=38.76.183.50
DORIS_QUERY_PORT=9030
DORIS_DATABASE=ods
DORIS_USERNAME=root
DORIS_PASSWORD=123456

# ---------- DataNote ----------
DATANOTE_PORT=8099

# ---------- DataX ----------
# local=本地执行  docker=Docker容器执行
DATAX_MODE=local

# ---------- 加密密钥（16/24/32 字节）----------
CRYPTO_KEY=DataNote_AES_Key

# ---------- 登录认证 ----------
# DATANOTE_PASSWORD 留空 = 开放访问（不启用认证，权限/越权检查全部旁路）
# 设非空 = 启用强制登录，内存兜底账号 = DATANOTE_USERNAME / DATANOTE_PASSWORD
# 另有库内 RBAC 账号：admin/admin123、viewer/viewer123（启用后可用，首登请改密）
DATANOTE_USERNAME=admin
DATANOTE_PASSWORD=

# ---------- Docker 网络 ----------
NETWORK=datanote-net
