# ============================================================
# DataNote 部署配置
# 两个安装脚本共享此文件，修改后重新运行脚本即可生效
# ============================================================

# ---------- MySQL ----------
MYSQL_HOST=127.0.0.1
MYSQL_PORT=3306
MYSQL_PASSWORD=

# ---------- Doris ----------
DORIS_HOST=
DORIS_QUERY_PORT=9030
DORIS_DATABASE=ods
DORIS_USERNAME=root
DORIS_PASSWORD=

# ---------- DataNote ----------
DATANOTE_PORT=8099

# ---------- DataX ----------
# local=本地执行  docker=Docker容器执行
DATAX_MODE=local

# ---------- 加密密钥（16/24/32 字节）----------
CRYPTO_KEY=

# ---------- 登录认证 ----------
# DATANOTE_AUTH_ENABLED 默认 true；仅本地临时调试可显式设为 false
# DATANOTE_PASSWORD 非空时作为内存兜底账号密码；为空时仅使用库内 RBAC 账号登录
# 库内 RBAC 账号请在「系统管理 → 用户管理」维护，禁止在配置文件记录默认口令
DATANOTE_AUTH_ENABLED=true
DATANOTE_USERNAME=admin
DATANOTE_PASSWORD=

# ---------- Docker 网络 ----------
NETWORK=datanote-net

# ---------- Redis(并发编辑锁; 部署脚本 docker run redis:7-alpine --requirepass) ----------
REDIS_HOST=127.0.0.1
REDIS_PORT=6379
REDIS_PASSWORD=
